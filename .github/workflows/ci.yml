name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Sync dependencies with uv (locked)
        working-directory: llmops_rag
        run: |
          uv pip install -r requirements.txt
          uv pip install pytest

      - name: Run tests
        working-directory: llmops_rag
        env:
          PYTHONPATH: ${{ github.workspace }}/llmops_rag
          OPENAI_API_KEY: dummy
        run: uv run pytest -q

